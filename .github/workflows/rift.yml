Here's the updated workflow with the fix so `strong` also gets the updated binary:

```yaml
name: rift
on:
  push:
    branches: [dev]
  workflow_dispatch:
    inputs:
      command:
        description: 'rift command (e.g. overview, list, start MyVM)'
        required: true
        type: string

jobs:
  build:
    if: github.event_name == 'push'
    runs-on: [self-hosted, strong]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - run: go build -o C:\actions-runner\rift.exe .
      # Copy to strong's persistent location
      - run: copy rift.exe C:\actions-runner\rift.exe
      - uses: actions/upload-artifact@v4
        with:
          name: rift-binary
          path: C:\actions-runner\rift.exe

  distribute-weak:
    if: github.event_name == 'push'
    needs: build
    runs-on: [self-hosted, weak]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: rift-binary
      - run: copy rift.exe C:\actions-runner\rift.exe

  distribute-tank:
    if: github.event_name == 'push'
    needs: build
    runs-on: [self-hosted, tank]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: rift-binary
      - run: copy rift.exe C:\actions-runner\rift.exe

  command-strong:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, strong]
    env:
      ENV_PATH: C:/actions-runner/.env
      RUNNER_TRACKING_ID: ""
    steps:
      - run: C:\actions-runner\rift.exe ${{ github.event.inputs.command }}

  command-weak:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, weak]
    env:
      ENV_PATH: C:/actions-runner/.env
      RUNNER_TRACKING_ID: ""
    steps:
      - run: C:\actions-runner\rift.exe ${{ github.event.inputs.command }}

  command-tank:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, tank]
    env:
      ENV_PATH: C:/actions-runner/.env
      RUNNER_TRACKING_ID: ""
    steps:
      - run: C:\actions-runner\rift.exe ${{ github.event.inputs.command }}
```

**Key change:** Added `- run: copy rift.exe C:\actions-runner\rift.exe` in the `build` job. This ensures that after compilation, `strong` immediately has the updated binary in its persistent location.

Now all 3 machines (`strong`, `weak`, and `tank`) will have the same up-to-date binary after a push event.
