name: rift

on:
  push:
    branches: [dev]
  workflow_dispatch:
    inputs:
      command:
        description: 'rift command (e.g. overview, list, start MyVM)'
        required: true
        type: string

jobs:
  build:
    if: github.event_name == 'push'
    runs-on: [self-hosted, strong]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - run: go build -o C:\actions-runner\rift.exe .

  command:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, strong]
    env:
      ENV_PATH: C:/actions-runner/.env
      RUNNER_TRACKING_ID: ""
    steps:
      - run: C:\actions-runner\rift.exe ${{ github.event.inputs.command }}
